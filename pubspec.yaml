name: nestory
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+4

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  flutter_timezone: ^3.0.1
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  pdf: ^3.11.1
  printing: ^5.13.2
  path_provider: ^2.1.5
  image_picker: ^1.1.2
  wakelock_plus: ^1.2.0
  url_launcher: ^6.3.1
  tutorial_coach_mark: ^1.3.3
  firebase_storage: ^12.4.10
  image_cropper: ^12.2.1
  image: ^4.8.0
  table_calendar: ^3.1.3
  file_picker: 8.1.4
  syncfusion_flutter_pdfviewer: ^33.2.13
  rxdart: ^0.28.0
  purchases_flutter: ^10.4.1
  purchases_ui_flutter: ^10.4.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/nesti_happy.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/
